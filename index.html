<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Task Manager</title>
<style>
  /* ── TOKENS ── */
  :root {
    --bg:        #F7F8FA;
    --surface:   #FFFFFF;
    --border:    #E2E6EA;
    --text:      #1A1D23;
    --muted:     #7A8494;
    --accent:    #5B5EF4;
    --accent-h:  #4346D6;
    --success:   #22C55E;
    --danger:    #EF4444;
    --warn:      #F59E0B;
    --low:       #94A3B8;
    --radius:    12px;
    --shadow:    0 2px 12px rgba(0,0,0,.07);
    --trans:     .2s ease;
  }
  [data-theme="dark"] {
    --bg:       #0F1117;
    --surface:  #1C1F2A;
    --border:   #2E3347;
    --text:     #E8EAF0;
    --muted:    #6B7280;
    --accent:   #7C7FFF;
    --accent-h: #6466E8;
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--trans), color var(--trans);
  }

  /* ── LAYOUT ── */
  .app {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 16px 64px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .header-left h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -.5px;
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p { color: var(--muted); font-size: .85rem; margin-top: 2px; }

  /* dark-mode toggle */
  .toggle-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: .85rem;
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    transition: border-color var(--trans), color var(--trans);
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── STATS BAR ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-card .num {
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-card .lbl { font-size: .75rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .stat-card.total  .num { color: var(--accent); }
  .stat-card.pending .num { color: var(--warn); }
  .stat-card.done   .num { color: var(--success); }

  /* ── INPUT AREA ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .input-row input {
    flex: 1;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .95rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color var(--trans);
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 20px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background var(--trans), transform .1s;
    white-space: nowrap;
  }
  .btn-add:hover  { background: var(--accent-h); }
  .btn-add:active { transform: scale(.97); }

  /* meta row */
  .meta-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .meta-row select,
  .meta-row input[type="date"] {
    flex: 1;
    min-width: 130px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .85rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
    transition: border-color var(--trans);
  }
  .meta-row select:focus,
  .meta-row input[type="date"]:focus { border-color: var(--accent); }

  /* search */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .9rem;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color var(--trans);
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* ── SECTION ── */
  .section { margin-bottom: 28px; }
  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .section-head h2 {
    font-size: 1rem;
    font-weight: 600;
  }
  .badge {
    background: var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: .75rem;
    font-weight: 600;
  }

  /* ── TASK ITEM ── */
  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: box-shadow var(--trans), opacity var(--trans);
    animation: slideIn .2s ease;
  }
  .task-item:hover { box-shadow: 0 4px 18px rgba(0,0,0,.11); }
  .task-item.done { opacity: .7; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* checkbox */
  .check-btn {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--trans);
    margin-top: 1px;
  }
  .check-btn:hover { border-color: var(--success); }
  .task-item.done .check-btn {
    background: var(--success);
    border-color: var(--success);
    color: #fff;
  }

  /* task body */
  .task-body { flex: 1; min-width: 0; }
  .task-name {
    font-size: .95rem;
    word-break: break-word;
    line-height: 1.4;
  }
  .task-item.done .task-name {
    text-decoration: line-through;
    color: var(--muted);
  }
  .task-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 5px;
  }
  .priority-tag {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .4px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .p-high   { background: #FEE2E2; color: #DC2626; }
  .p-medium { background: #FEF3C7; color: #D97706; }
  .p-low    { background: #E2E8F0; color: #475569; }
  [data-theme="dark"] .p-high   { background: #450a0a; color: #FCA5A5; }
  [data-theme="dark"] .p-medium { background: #422006; color: #FCD34D; }
  [data-theme="dark"] .p-low    { background: #1e293b; color: #94A3B8; }

  .due-tag {
    font-size: .72rem;
    color: var(--muted);
    display: flex; align-items: center; gap: 3px;
  }
  .due-tag.overdue { color: var(--danger); font-weight: 600; }

  /* delete btn */
  .del-btn {
    flex-shrink: 0;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 3px;
    border-radius: 6px;
    transition: color var(--trans), background var(--trans);
    display: flex; align-items: center; justify-content: center;
  }
  .del-btn:hover { color: var(--danger); background: #FEE2E2; }
  [data-theme="dark"] .del-btn:hover { background: #450a0a; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: .9rem;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty svg { display: block; margin: 0 auto 10px; opacity: .4; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .stat-card .num { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>Smart <span>Task</span> Manager</h1>
      <p>Stay organised. Stay ahead.</p>
    </div>
    <button class="toggle-btn" id="themeBtn" onclick="toggleTheme()">
      <span id="themeIcon">🌙</span> Dark Mode
    </button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card total">
      <div class="num" id="totalCount">0</div>
      <div class="lbl">Total Tasks</div>
    </div>
    <div class="stat-card pending">
      <div class="num" id="pendingCount">0</div>
      <div class="lbl">Pending</div>
    </div>
    <div class="stat-card done">
      <div class="num" id="doneCount">0</div>
      <div class="lbl">Completed</div>
    </div>
  </div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Enter a new task…" onkeydown="if(event.key==='Enter')addTask()" />
      <button class="btn-add" onclick="addTask()">+ Add Task</button>
    </div>
    <div class="meta-row">
      <select id="prioritySelect">
        <option value="medium">⚡ Medium Priority</option>
        <option value="high">🔴 High Priority</option>
        <option value="low">🔵 Low Priority</option>
      </select>
      <input type="date" id="dueDateInput" />
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </span>
    <input type="text" id="searchInput" placeholder="Search tasks…" oninput="renderTasks()" />
  </div>

  <!-- PENDING -->
  <div class="section">
    <div class="section-head">
      <svg width="18" height="18" fill="none" stroke="#F59E0B" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <h2>Pending Tasks</h2>
      <span class="badge" id="pendingBadge">0</span>
    </div>
    <div class="task-list" id="pendingList"></div>
  </div>

  <!-- COMPLETED -->
  <div class="section">
    <div class="section-head">
      <svg width="18" height="18" fill="none" stroke="#22C55E" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <h2>Completed Tasks</h2>
      <span class="badge" id="doneBadge">0</span>
    </div>
    <div class="task-list" id="doneList"></div>
  </div>

</div>

<script>
// ── STATE ──
let tasks = JSON.parse(localStorage.getItem('stm_tasks') || '[]');

function save() {
  localStorage.setItem('stm_tasks', JSON.stringify(tasks));
}

// ── ADD ──
function addTask() {
  const input = document.getElementById('taskInput');
  const name  = input.value.trim();
  if (!name) { input.focus(); return; }

  const priority = document.getElementById('prioritySelect').value;
  const due      = document.getElementById('dueDateInput').value;

  tasks.unshift({
    id:        Date.now(),
    name,
    priority,
    due,
    done:      false,
    createdAt: new Date().toISOString()
  });

  input.value = '';
  document.getElementById('dueDateInput').value = '';
  save();
  renderTasks();
  input.focus();
}

// ── TOGGLE DONE ──
function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderTasks(); }
}

// ── DELETE ──
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderTasks();
}

// ── RENDER ──
function renderTasks() {
  const q = document.getElementById('searchInput').value.toLowerCase();

  const filtered = q
    ? tasks.filter(t => t.name.toLowerCase().includes(q))
    : tasks;

  const pending   = filtered.filter(t => !t.done);
  const completed = filtered.filter(t =>  t.done);

  document.getElementById('totalCount').textContent   = tasks.length;
  document.getElementById('pendingCount').textContent = tasks.filter(t => !t.done).length;
  document.getElementById('doneCount').textContent    = tasks.filter(t =>  t.done).length;
  document.getElementById('pendingBadge').textContent = pending.length;
  document.getElementById('doneBadge').textContent    = completed.length;

  document.getElementById('pendingList').innerHTML   = pending.length   ? pending.map(taskHTML).join('')   : emptyHTML('No pending tasks! 🎉');
  document.getElementById('doneList').innerHTML      = completed.length ? completed.map(taskHTML).join('') : emptyHTML('No completed tasks yet.');
}

function taskHTML(t) {
  const today = new Date().toISOString().split('T')[0];
  const overdue = t.due && t.due < today && !t.done;
  const dueLabel = t.due
    ? `<span class="due-tag ${overdue ? 'overdue' : ''}">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${overdue ? 'Overdue · ' : ''}${t.due}
       </span>`
    : '';

  const checkIcon = t.done
    ? `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
    : '';

  return `
    <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
      <button class="check-btn" onclick="toggleTask(${t.id})" title="${t.done ? 'Mark pending' : 'Mark complete'}">${checkIcon}</button>
      <div class="task-body">
        <div class="task-name">${escapeHTML(t.name)}</div>
        <div class="task-meta">
          <span class="priority-tag p-${t.priority}">${t.priority}</span>
          ${dueLabel}
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask(${t.id})" title="Delete task">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>`;
}

function emptyHTML(msg) {
  return `<div class="empty">
    <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
    ${msg}
  </div>`;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DARK MODE ──
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeBtn').innerHTML =
    `<span id="themeIcon">${isDark ? '🌙' : '☀️'}</span> ${isDark ? 'Dark' : 'Light'} Mode`;
  localStorage.setItem('stm_theme', isDark ? 'light' : 'dark');
}

// ── INIT ──
(function init() {
  const theme = localStorage.getItem('stm_theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  if (theme === 'dark') {
    document.getElementById('themeIcon').textContent = '☀️';
    document.getElementById('themeBtn').innerHTML = '<span id="themeIcon">☀️</span> Light Mode';
  }
  renderTasks();
})();
</script>
</body>
</html>
